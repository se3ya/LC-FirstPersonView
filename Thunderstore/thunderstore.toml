[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "seechela"
name = "First-Person_View"
description = "See your own body."
websiteUrl = "https://github.com/se3ya/LC-FirstPersonView"
containsNswContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "../Plugin/FirstPersonView/bin/Release/netstandard2.1/FirstPersonView.dll"
target = "BepInEx/plugins/FirstPersonView/FirstPersonView.dll"

[[build.copy]]
source = "./CHANGELOG.md"
target = "/"